# Workflow simple para hacer deploy de tu sitio estático en GitHub Pages
name: Deploy static content to Pages

on:
  # Se ejecuta cuando haces push a la rama main
  push:
    branches: ['main']
  # Permite ejecutar este flujo de trabajo manualmente desde la pestaña Actions
  workflow_dispatch:

# Otorga permisos al GITHUB_TOKEN para hacer el deploy en GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Permite solo un deploy concurrente
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Trabajo de despliegue
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          
      - name: Install dependencies
        run: npm install
        
      - name: Build
        run: npm run build
        
      - name: Setup Pages
        uses: actions/configure-pages@v4
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
